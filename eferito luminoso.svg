<svg width="800" height="1000" viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg" style="background: transparent;">
  <defs>
    <!-- Filtro Otimizado para Suavidade e Fluidez -->
    <filter id="smoothPlasma" x="-200%" y="-200%" width="500%" height="500%" color-interpolation-filters="sRGB">
      <!-- Ruído de baixa frequência para movimentos ondulados, não ruidosos -->
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="2" result="noise">
        <animate attributeName="baseFrequency" values="0.01; 0.03; 0.01" dur="4s" repeatCount="indefinite" />
      </feTurbulence>
      
      <!-- Deslocamento suave para evitar quebras de pixel -->
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="40" />
      
      <!-- Tripla camada de desfoque para um degradê perfeito -->
      <feGaussianBlur stdDeviation="70" result="ultraBlur" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="25" result="midBlur" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="coreBlur" />
      
      <feMerge>
        <feMergeNode in="ultraBlur"/>
        <feMergeNode in="midBlur"/>
        <feMergeNode in="coreBlur"/>
      </feMerge>
    </filter>

    <radialGradient id="liquidEnergy">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8" />
      <stop offset="30%" stop-color="#FFD700" stop-opacity="0.4" />
      <stop offset="70%" stop-color="#FF4500" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#FF4500" stop-opacity="0" />
    </radialGradient>
  </defs>

  <g transform="translate(400, 500)">
    <!-- Movimento de Amplitude Controlada -->
    <g>
      <animateTransform attributeName="transform" type="scale" 
                        values="1; 1.3; 1" 
                        dur="2.5s" 
                        repeatCount="indefinite" 
                        calcMode="spline" 
                        keySplines="0.42 0 0.58 1; 0.42 0 0.58 1" />
      
      <!-- Retângulo de base com cantos bem arredondados para suavizar a forma -->
      <rect x="-150" y="-250" width="300" height="500" rx="80" 
            fill="url(#liquidEnergy)" 
            filter="url(#smoothPlasma)">
        <!-- Transição de opacidade mais lenta para evitar 'flicker' -->
        <animate attributeName="opacity" values="0.3; 0.7; 0.3" dur="2.5s" repeatCount="indefinite" />
      </rect>
    </g>
  </g>
</svg>
