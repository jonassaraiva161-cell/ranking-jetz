<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; background: #000; overflow: hidden; }
  .circuit-container {
    position: fixed;
    inset: 0;
    opacity: 0.3; /* Ajustado para melhor visibilidade */
    pointer-events: none;
  }
  
  path {
    stroke-dasharray: 1000;
    stroke-dashoffset: 1000;
    animation: draw 5s linear infinite;
  }

  @keyframes draw {
    0% { stroke-dashoffset: 1000; opacity: 0; }
    20% { opacity: 1; }
    80% { opacity: 1; }
    100% { stroke-dashoffset: 0; opacity: 0; }
  }

  .dot {
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.5); opacity: 1; }
  }
</style>
</head>
<body>

<div class="circuit-container">
  <svg width="100%" height="100%" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ea580c" />
        <stop offset="100%" stop-color="#f97316" />
      </linearGradient>
    </defs>

    <path d="M 50 50 L 150 50 L 150 150 L 250 150" stroke="url(#g)" stroke-width="2" fill="none" />
    <circle class="dot" cx="250" cy="150" r="4" fill="#ea580c" />
    
    </svg>
</div>

</body>
</html>
