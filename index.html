<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <style>
        /* Força a transparência absoluta em todos os níveis */
        * {
            background: transparent !important;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            background-color: rgba(0, 0, 0, 0) !important;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        canvas {
            display: block;
            background-color: transparent !important;
        }
    </style>
</head>
<body>

<canvas id="circuitCanvas"></canvas>

<script>
    const canvas = document.getElementById('circuitCanvas');
    const ctx = canvas.getContext('2d');

    let width, height, particles;
    const particleCount = 40;
    const speed = 0.6;
    const color = '#00f2ff'; // Azul Neon Jetz

    class Particle {
        constructor() {
            this.reset();
        }

        reset() {
            this.x = Math.random() * width;
            this.y = Math.random() * height;
            this.vx = (Math.random() - 0.5) * speed;
            this.vy = (Math.random() - 0.5) * speed;
            this.history = [];
            this.size = Math.random() * 2 + 1;
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;

            this.history.push({ x: this.x, y: this.y });
            if (this.history.length > 15) this.history.shift();

            if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
                this.reset();
            }
        }

        draw() {
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = 0.4;
            
            if (this.history.length > 1) {
                ctx.moveTo(this.history.x, this.history.y);
                for (let i = 1; i < this.history.length; i++) {
                    ctx.lineTo(this.history[i].x, this.history[i].y);
                }
            }
            ctx.stroke();

            // Pulso de luz (cabeça)
            ctx.fillStyle = color;
            ctx.shadowBlur = 8;
            ctx.shadowColor = color;
            ctx.fillRect(this.x - 1, this.y - 1, this.size, this.size);
            ctx.shadowBlur = 0;
        }
    }

    function init() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        particles = [];
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }
    }

    function animate() {
        // ctx.clearRect garante que o fundo seja limpo mantendo a transparência
        ctx.clearRect(0, 0, width, height); 
        
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 100) {
                    ctx.beginPath();
                    ctx.strokeStyle = `rgba(0, 242, 255, ${0.8 - dist / 100})`;
                    ctx.lineWidth = 0.1;
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.stroke();
                }
            }
            particles[i].update();
            particles[i].draw();
        }
        requestAnimationFrame(animate);
    }

    window.addEventListener('resize', init);
    init();
    animate();
</script>

</body>
</html>
