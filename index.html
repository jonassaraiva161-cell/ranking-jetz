<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <style>
        /* Configuração de transparência total e centralização */
        body, html { 
            margin: 0; 
            padding: 0; 
            background: transparent; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }

        /* Container do Troféu Único */
        .trophy-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* O Troféu de Ouro 3D Realista */
        .gold-trophy {
            /* Usando um render 3D realista de alta qualidade */
            background-image: url('https://img.icons8.com/isometric/512/trophy.png'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            width: 180px;  /* Tamanho grande para destaque */
            height: 180px;
            position: relative;
            
            /* Sombra projetada para dar volume e profundidade (efeito 3D) */
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5));
            
            /* Animações combinadas (semelhante ao vídeo) */
            animation: 
                float 3.5s ease-in-out infinite,     /* Flutuar (sobe e desce) */
                pulse 2.5s ease-in-out infinite,      /* Pulsar (tamanho) */
                scintillate 5s linear infinite;        /* Cintilar (brilho) */
        }

        /* --- Definição das Animações (CSS Keyframes) --- */

        /* 1. Flutuar (Sobe e desce suavemente) */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); } /* Sobe 30px */
        }

        /* 2. Pulsar (Aumenta e diminui levemente, como um batimento) */
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.06); } /* Aumenta 6% */
        }

        /* 3. Cintilar (Emula reflexos de luz e brilho metálico do vídeo) */
        @keyframes scintillate {
            0%, 100% { 
                opacity: 1; 
                filter: brightness(1) drop-shadow(0 0 15px rgba(255, 215, 0, 0.5)); 
            }
            50% { 
                opacity: 0.95; 
                /* Brilho intenso e sombra metálica expandida */
                filter: brightness(1.4) drop-shadow(0 0 35px rgba(255, 255, 255, 0.9)); 
            }
        }

        /* --- Interatividade (Ao passar o mouse) --- */
        .gold-trophy:hover {
            cursor: pointer;
            transition: 0.3s;
            /* Pára as animações para focar no brilho */
            animation-play-state: paused; 
            transform: scale(1.3) rotate(5deg);
            filter: brightness(1.7) drop-shadow(0 0 50px white);
        }

    </style>
</head>
<body>

    <div class="trophy-container">
        <div class="gold-trophy"></div>
    </div>

</body>
</html>
