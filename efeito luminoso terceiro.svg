<svg width="800" height="1000" viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg" style="background: transparent;">
  <defs>
    <!-- Filtro de Energia de Bronze -->
    <filter id="bronzePlasma" x="-200%" y="-200%" width="500%" height="500%" color-interpolation-filters="sRGB">
      <!-- Distorção orgânica para parecer metal líquido ou fogo -->
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="2" result="noise">
        <animate attributeName="baseFrequency" values="0.01; 0.03; 0.01" dur="4s" repeatCount="indefinite" />
      </feTurbulence>
      
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="45" />
      
      <!-- Camadas de brilho para profundidade de cor -->
      <feGaussianBlur stdDeviation="65" result="outerGlow" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="midGlow" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="innerHeat" />
      
      <feMerge>
        <feMergeNode in="outerGlow"/>
        <feMergeNode in="midGlow"/>
        <feMergeNode in="innerHeat"/>
      </feMerge>
    </filter>

    <!-- Gradiente Bronze / Cobre Quente -->
    <radialGradient id="bronzeEnergy">
      <stop offset="0%" stop-color="#FFE4B5" stop-opacity="0.9" /> <!-- Núcleo incandescente -->
      <stop offset="30%" stop-color="#CD7F32" stop-opacity="0.6" /> <!-- Bronze clássico -->
      <stop offset="70%" stop-color="#8B4513" stop-opacity="0.3" /> <!-- Marrom profundo -->
      <stop offset="100%" stop-color="#3D1F00" stop-opacity="0" />
    </radialGradient>
  </defs>

  <g transform="translate(400, 500)">
    <!-- Pulsação de Alta Amplitude -->
    <g>
      <animateTransform attributeName="transform" type="scale" 
                        values="1; 1.35; 1" 
                        dur="2.8s" 
                        repeatCount="indefinite" 
                        calcMode="spline" 
                        keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
      
      <!-- Forma da névoa de bronze -->
      <rect x="-150" y="-250" width="300" height="500" rx="90" 
            fill="url(#bronzeEnergy)" 
            filter="url(#bronzePlasma)">
        <animate attributeName="opacity" values="0.4; 0.8; 0.4" dur="2.8s" repeatCount="indefinite" />
      </rect>
    </g>
  </g>
</svg>
