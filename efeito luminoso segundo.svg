<svg width="800" height="1000" viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg" style="background: transparent;">
  <defs>
    <!-- Filtro de Plasma Prateado -->
    <filter id="silverPlasma" x="-200%" y="-200%" width="500%" height="500%" color-interpolation-filters="sRGB">
      <!-- Movimento orgânico da névoa -->
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" result="noise">
        <animate attributeName="baseFrequency" values="0.01; 0.025; 0.01" dur="5s" repeatCount="indefinite" />
      </feTurbulence>
      
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="35" />
      
      <!-- Camadas de desfoque para brilho metálico -->
      <feGaussianBlur stdDeviation="60" result="softGlow" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="15" result="midGlow" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="coreGlow" />
      
      <feMerge>
        <feMergeNode in="softGlow"/>
        <feMergeNode in="midGlow"/>
        <feMergeNode in="coreGlow"/>
      </feMerge>
    </filter>

    <!-- Gradiente Prata / Cromado -->
    <radialGradient id="silverEnergy">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9" /> <!-- Núcleo Branco -->
      <stop offset="30%" stop-color="#E0E0E0" stop-opacity="0.5" /> <!-- Prata Claro -->
      <stop offset="70%" stop-color="#A0A0A0" stop-opacity="0.2" /> <!-- Sombra Metálica -->
      <stop offset="100%" stop-color="#C0C0C0" stop-opacity="0" />
    </radialGradient>
  </defs>

  <g transform="translate(400, 500)">
    <!-- Pulsação Suave e Elegante -->
    <g>
      <animateTransform attributeName="transform" type="scale" 
                        values="1; 1.25; 1" 
                        dur="3s" 
                        repeatCount="indefinite" 
                        calcMode="spline" 
                        keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
      
      <!-- Forma da névoa prateada -->
      <rect x="-150" y="-250" width="300" height="500" rx="100" 
            fill="url(#silverEnergy)" 
            filter="url(#silverPlasma)">
        <animate attributeName="opacity" values="0.4; 0.8; 0.4" dur="3s" repeatCount="indefinite" />
      </rect>
    </g>
  </g>
</svg>
