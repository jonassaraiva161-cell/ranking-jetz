<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%" style="background: transparent;">
  <defs>
    <radialGradient id="gold-deep" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#FF8C00" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    
    <radialGradient id="gold-medium" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE259" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#FFA751" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="gold-bright" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF5C0" stop-opacity="1"/>
      <stop offset="40%" stop-color="#FFD700" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>

    <style>
      /* Cadência de animação micro-síncrona para efeito de partículas vivas */
      @keyframes float-slow {
        0% { transform: translateY(0px) translateX(0px); opacity: 0.2; }
        50% { transform: translateY(-25px) translateX(10px); opacity: 0.65; }
        100% { transform: translateY(0px) translateX(0px); opacity: 0.2; }
      }

      @keyframes float-medium {
        0% { transform: translateY(0px) translateX(0px); opacity: 0.3; }
        50% { transform: translateY(-45px) translateX(-10px); opacity: 0.8; }
        100% { transform: translateY(0px) translateX(0px); opacity: 0.3; }
      }

      @keyframes float-fast {
        0% { transform: translateY(0px) translateX(0px); opacity: 0.4; }
        50% { transform: translateY(-65px) translateX(8px); opacity: 0.95; }
        100% { transform: translateY(0px) translateX(0px); opacity: 0.4; }
      }

      .layer-slow { animation: float-slow 20s infinite ease-in-out; transform-origin: center; }
      .layer-medium { animation: float-medium 14s infinite ease-in-out; transform-origin: center; }
      .layer-fast { animation: float-fast 9s infinite ease-in-out; transform-origin: center; }
    </style>
  </defs>

