    <circle cx="1280" cy="760" r="3" fill="url(#gold-medium)" /><circle cx="1410" cy="670" r="4.5" fill="url(#gold-deep)" /><circle cx="1550" cy="790" r="3.5" fill="url(#gold-medium)" /><circle cx="1690" cy="730" r="4" fill="url(#gold-medium)" />
    <circle cx="1320" cy="910" r="4" fill="url(#gold-medium)" /><circle cx="1480" cy="860" r="3.5" fill="url(#gold-medium)" /><circle cx="1610" cy="950" r="4.5" fill="url(#gold-deep)" /><circle cx="1760" cy="890" r="3" fill="url(#gold-medium)" />
    <circle cx="1820" cy="270" r="4" fill="url(#gold-medium)" /><circle cx="1890" cy="560" r="3.5" fill="url(#gold-deep)" /><circle cx="1840" cy="810" r="4" fill="url(#gold-medium)" />
