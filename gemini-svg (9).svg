    <circle cx="100" cy="150" r="6" fill="url(#gold-deep)" /><circle cx="180" cy="280" r="8" fill="url(#gold-deep)" /><circle cx="290" cy="120" r="5" fill="url(#gold-medium)" /><circle cx="80" cy="450" r="7" fill="url(#gold-deep)" /><circle cx="220" cy="380" r="9" fill="url(#gold-deep)" />
    <circle cx="150" cy="600" r="7" fill="url(#gold-deep)" /><circle cx="310" cy="720" r="6" fill="url(#gold-deep)" /><circle cx="250" cy="890" r="9" fill="url(#gold-medium)" /><circle cx="90" cy="780" r="5" fill="url(#gold-deep)" /><circle cx="120" cy="950" r="8" fill="url(#gold-deep)" />
    <circle cx="450" cy="200" r="8" fill="url(#gold-deep)" /><circle cx="580" cy="110" r="5" fill="url(#gold-medium)" /><circle cx="690" cy="320" r="7" fill="url(#gold-deep)" /><circle cx="520" cy="480" r="9" fill="url(#gold-deep)" /><circle cx="640" cy="550" r="6" fill="url(#gold-medium)" />
    <circle cx="480" cy="710" r="6" fill="url(#gold-deep)" /><circle cx="610" cy="830" r="8" fill="url(#gold-deep)" /><circle cx="730" cy="690" r="5" fill="url(#gold-medium)" /><circle cx="550" cy="920" r="7" fill="url(#gold-deep)" /><circle cx="700" cy="800" r="9" fill="url(#gold-deep)" />
