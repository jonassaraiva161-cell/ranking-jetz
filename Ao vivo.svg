<svg width="50" height="50" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="background: transparent;">
    <style>
        /* Animação do Ponto Central */
        @keyframes live-dot-glow {
            0%, 100% { transform: scale(0.9); opacity: 0.9; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        /* Animação das Ondas de Transmissão */
        @keyframes live-ring-expand {
            0% { transform: scale(0.3); opacity: 0.8; }
            80% { opacity: 0.3; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        .svg-dot {
            transform-origin: center;
            animation: live-dot-glow 1.5s infinite ease-in-out;
        }

        .svg-ring {
            transform-origin: center;
            animation: live-ring-expand 2s infinite cubic-bezier(0.215, 0.610, 0.355, 1);
        }

        .svg-ring-delayed {
            transform-origin: center;
            animation: live-ring-expand 2s infinite cubic-bezier(0.215, 0.610, 0.355, 1);
            animation-delay: 0.6s;
        }
    </style>

    <!-- Ondas externas de pulso -->
    <circle class="svg-ring-delayed" cx="50" cy="50" r="30" fill="none" stroke="#ff3b30" stroke-width="4" />
    <circle class="svg-ring" cx="50" cy="50" r="30" fill="none" stroke="#ff3b30" stroke-width="6" />
    
    <!-- Ponto central -->
    <circle class="svg-dot" cx="50" cy="50" r="16" fill="#ff3b30" />
</svg>
